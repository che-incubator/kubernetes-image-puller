deploymentName: kubernetes-image-puller
deploymentAnnotations: {}
image:
  repository: quay.io/eclipse/kubernetes-image-puller
  tag: next
serviceAccount:
  name: k8s-image-puller
updateStrategy:
  type: Recreate
priorityClassName: ""
configMap:
  name: k8s-image-puller
  images: >
    java11-maven=quay.io/eclipse/che-java11-maven:nightly;
    che-theia=quay.io/eclipse/che-theia:next;
    java-plugin-runner=eclipse/che-remote-plugin-runner-java8:latest;
  cachingIntervalHours: 1
  cachingMemoryRequest: "10Mi"
  cachingMemoryLimit: "20Mi"
  cachingCpuRequest: ".05"
  cachingCpuLimit: ".2"
  daemonsetAnnotations: "{}"
  nodeSelector: "{}"
  imagePullSecrets: ""
  affinity: "{}"
  # Tolerations applied to pods created by the daemonset, provided in this format (escaped JSON) `'[{\"key\":\"foo\",\"operator\":\"Equal\",\"value\":\"bar\"}
  tolerations: '[]'
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
tolerations: []
nodeSelector: {}
containerSecurityContext: {}
