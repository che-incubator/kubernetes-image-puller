deploymentName: kubernetes-image-puller
deploymentAnnotations: {}
image:
  repository: quay.io/eclipse/kubernetes-image-puller
  tag: 0.1.0
serviceAccount:
  name: k8s-image-puller
updateStrategy:
  type: Recreate
priorityClassName: ""
configMap:
  name: k8s-image-puller
  images: >
    che-code=quay.io/che-incubator/che-code:next;
    base-developer-image=quay.io/devfile/base-developer-image:ubi9-latest;
  cachingIntervalHours: 1
  cachingMemoryRequest: "10Mi"
  cachingMemoryLimit: "20Mi"
  cachingCpuRequest: ".05"
  cachingCpuLimit: ".2"
  daemonsetAnnotations: "{}"
  nodeSelector: "{}"
  imagePullSecrets: ""
  affinity: "{}"
  # Tolerations applied to pods created by the daemonset, provided in this format (escaped JSON) `'[{\"key\":\"foo\",\"operator\":\"Equal\",\"value\":\"bar\"}
  tolerations: '[]'
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
tolerations: []
nodeSelector: {}
containerSecurityContext: {}
