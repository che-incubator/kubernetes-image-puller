name: build-next

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    -
      name: Clone source code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      with:
        persist-credentials: false
    -
      name: Set up Go
      uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5
      with:
        go-version-file: go.mod
    -
      name: Run tests
      run: make test
    -
      name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
        govulncheck ./...

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
    -
      name: "Set up QEMU"
      uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
    -
      name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
    -
      name: "Docker quay.io Login"
      uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    -
      name: Clone source code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      with:
        fetch-depth: 0
        persist-credentials: false
    - 
      name: Prepare
      id: prep
      run: |
        set -e
        echo "short_sha1=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "version=next" >> $GITHUB_OUTPUT
        echo "image=kubernetes-image-puller" >> $GITHUB_OUTPUT
    -
      name: "Build and push"
      uses: docker/build-push-action@1104d471370f9806843c095c1db02b5a90c5f8b6 # v3
      with:
        context: .
        file: ./build/dockerfiles/Dockerfile
        tags:  quay.io/eclipse/${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version }},quay.io/eclipse/${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.short_sha1 }}
        push: true
    - 
      name: Create failure MM message
      if: ${{ failure() }}
      run: |
        echo "{\"text\":\":no_entry_sign: Kubernetes Image puller build has failed: https://github.com/che-incubator/kubernetes-image-puller/actions/workflows/next-build.yml\"}" > mattermost.json
    - 
      name: Send MM message
      if: ${{ failure() }}
      uses: mattermost/action-mattermost-notify@826343e28f7ff679a883b01161387142ee429a85 # 1.1.0
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        MATTERMOST_CHANNEL: eclipse-che-ci
        MATTERMOST_USERNAME: che-bot
