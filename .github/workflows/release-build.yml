name: build-release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    -
      name: Clone source code
      uses: actions/checkout@v7
      with:
        persist-credentials: false
    -
      name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    -
      name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
    -
      name: Run tests
      run: make test

  build:
    needs: test
    runs-on: ubuntu-22.04
    steps:
    -
      name: "Set up QEMU"
      uses: docker/setup-qemu-action@v4
    -
      name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@v4
    -
      name: "Docker quay.io Login"
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    -
      name: Clone source code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false
    -
      name: Prepare
      id: prep
      run: |
        set -e
        SHORT_SHA1=$(git rev-parse --short HEAD)
        VERSION=${GITHUB_REF_NAME#v}
        echo "short_sha1=${SHORT_SHA1}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "image=kubernetes-image-puller" >> $GITHUB_OUTPUT
    -
      name: "Build and push"
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./build/dockerfiles/Dockerfile
        tags: |
          quay.io/eclipse/${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version }}
          quay.io/eclipse/${{ steps.prep.outputs.image }}:latest
        push: true
