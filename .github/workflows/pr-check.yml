name: pr-check

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    -
      name: Clone source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    -
      name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
    -
      name: Check go mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
    -
      name: Run golangci-lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
    -
      name: Run tests
      run: make test

  helm-lint:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    -
      name: Clone source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    -
      name: Set up Helm
      uses: azure/setup-helm@59b1c81c6280f5abebb1fb1bc585696daa7dfb42 # v5
    -
      name: Lint chart
      run: helm lint deploy/helm/
    -
      name: Install kubeconform
      run: |
        curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz | tar xz
        sudo mv kubeconform /usr/local/bin/
    -
      name: Validate template rendering
      run: helm template test deploy/helm/ | kubeconform -strict -summary

  build:
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    -
      name: "Set up QEMU"
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
    -
      name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    -
      name: Clone source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    -
      name: "Test build (all platforms)"
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        file: ./build/dockerfiles/Dockerfile
        platforms: linux/amd64,linux/arm64,linux/ppc64le,linux/s390x
        push: false
